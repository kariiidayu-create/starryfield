<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- 黑色背景 -->
  <rect width="16" height="16" fill="#0a0a0f"/>
  <!-- 流星尾巴（从左上到右下渐淡） -->
  <rect x="1" y="2" width="2" height="2" fill="#705000" opacity="0.4"/>
  <rect x="3" y="4" width="2" height="2" fill="#a07800" opacity="0.6"/>
  <rect x="5" y="6" width="2" height="2" fill="#d4a017" opacity="0.8"/>
  <!-- 流星主体 -->
  <rect x="7" y="8" width="2" height="2" fill="#ffd700"/>
  <rect x="9" y="10" width="2" height="2" fill="#ffd700"/>
  <!-- 流星头部（最亮） -->
  <rect x="11" y="12" width="3" height="3" fill="#ffe766"/>
  <rect x="12" y="11" width="1" height="1" fill="#fff5cc"/>
  <!-- 小闪光 -->
  <rect x="13" y="13" width="1" height="1" fill="#ffffff"/>
</svg>
