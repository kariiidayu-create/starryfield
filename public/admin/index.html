<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STARRYFIELD Admin</title>
    <style>
      body { margin: 0; background: #0a0a0f; color: #00fff5; font-family: monospace; }
      #status { text-align: center; padding-top: 40vh; font-size: 14px; }
      #error { color: #ff6b6b; white-space: pre-wrap; max-width: 600px; margin: 20px auto; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="status">// LOADING CMS...<div id="error"></div></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('error').textContent = msg + '\n' + src + ':' + line;
      };
    </script>
    <script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js" onerror="document.getElementById('error').textContent='CDN load failed'"></script>
  </body>
</html>
